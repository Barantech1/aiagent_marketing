<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cruzo Lead Generation Agent — Barantech</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #efefec;
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9b9b9b;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --gap: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1c;
      --bg-secondary: #262626;
      --bg-tertiary: #2e2e2e;
      --text: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-tertiary: #6a6a6a;
      --border: rgba(255,255,255,0.1);
      --border-md: rgba(255,255,255,0.2);
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header .brand { display: flex; align-items: center; gap: 12px; }
  header .logo {
    width: 36px; height: 36px; border-radius: var(--radius-md);
    background: #0a0a0a; display: flex; align-items: center;
    justify-content: center; font-size: 16px; color: #fff; font-weight: 700;
  }
  header .brand-text .sup {
    font-size: 10px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  header .brand-text h1 { font-size: 17px; font-weight: 600; color: var(--text); }

  .api-bar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .api-bar input {
    font-family: var(--font-mono); font-size: 12px;
    padding: 7px 12px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-md);
    background: var(--bg); color: var(--text);
    width: 260px;
  }
  .api-bar input::placeholder { color: var(--text-tertiary); }
  .api-bar .save-btn {
    padding: 7px 14px; border-radius: var(--radius-md); font-size: 13px;
    font-weight: 500; cursor: pointer; font-family: var(--font);
    background: var(--text); color: var(--bg); border: none;
  }
  .api-bar .save-btn:hover { opacity: 0.85; }
  .api-status { font-size: 12px; color: var(--text-tertiary); }

  .panel {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .tabs {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg-secondary);
    overflow-x: auto;
  }
  .tab {
    background: none; border: none; padding: 12px 20px;
    font-size: 14px; color: var(--text-secondary); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -0.5px;
    font-family: var(--font); white-space: nowrap; font-weight: 400;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

  .section { display: none; padding: 1.5rem; }
  .section.active { display: block; }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: var(--gap);
  }

  label {
    font-size: 13px; color: var(--text-secondary);
    display: block; margin-bottom: 6px; margin-top: 14px;
  }
  label:first-child { margin-top: 0; }

  input[type=text], textarea, select {
    width: 100%; font-family: var(--font); font-size: 14px;
    padding: 8px 12px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-md);
    background: var(--bg-secondary); color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus, textarea:focus, select:focus {
    border-color: var(--text);
  }
  textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
  select { cursor: pointer; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }
  @media (max-width: 540px) { .row { grid-template-columns: 1fr; } }

  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip {
    padding: 5px 13px; border-radius: 99px; font-size: 12px;
    border: 0.5px solid var(--border-md); cursor: pointer;
    color: var(--text-secondary); background: transparent;
    font-family: var(--font); transition: all 0.15s;
  }
  .chip:hover { border-color: var(--text); color: var(--text); }
  .chip.active { background: var(--text); color: var(--bg); border-color: transparent; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: var(--radius-md);
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: var(--font); border: 0.5px solid var(--border-md);
    background: transparent; color: var(--text); transition: all 0.15s;
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary {
    background: var(--text); color: var(--bg); border-color: transparent;
  }
  .btn-primary:hover { opacity: 0.85; background: var(--text); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .action-row { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; align-items: center; }

  .spinner {
    width: 14px; height: 14px; border: 2px solid currentColor;
    border-top-color: transparent; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-msg {
    font-size: 13px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 8px;
  }

  .metric-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: var(--gap); margin-bottom: 1.5rem;
  }
  .metric {
    background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem;
  }
  .metric-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .metric-value { font-size: 26px; font-weight: 600; }

  .leads-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 0.5px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  thead th {
    text-align: left; font-weight: 500; font-size: 12px;
    color: var(--text-secondary); padding: 10px 12px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg-secondary);
  }
  tbody td {
    padding: 10px 12px; border-bottom: 0.5px solid var(--border);
    vertical-align: top; word-break: break-word;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg-secondary); }

  .score-badge {
    display: inline-block; padding: 2px 8px;
    border-radius: var(--radius-md); font-size: 12px; font-weight: 500;
  }
  .score-high { background: #EAF3DE; color: #3B6D11; }
  .score-mid  { background: #FAEEDA; color: #854F0B; }
  .score-low  { background: #FCEBEB; color: #A32D2D; }

  .tag {
    display: inline-block; background: var(--bg-secondary);
    border: 0.5px solid var(--border); border-radius: var(--radius-md);
    padding: 2px 8px; font-size: 11px; color: var(--text-secondary);
  }

  .email-preview {
    background: var(--bg-secondary); border-radius: var(--radius-md);
    padding: 1rem; font-size: 13px; line-height: 1.75;
    white-space: pre-wrap; min-height: 140px;
  }
  .email-subject-row {
    font-size: 13px; color: var(--text-secondary); margin-bottom: 8px;
  }
  .email-subject-row span { color: var(--text); font-weight: 500; }

  .cal-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border);
  }
  .cal-row:last-child { border-bottom: none; }
  .cal-name { font-size: 14px; font-weight: 500; }
  .cal-detail { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }

  .empty {
    text-align: center; padding: 2.5rem;
    color: var(--text-tertiary); font-size: 14px;
  }

  .section-title {
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary); margin-bottom: 12px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="brand">
      <div class="logo">B</div>
      <div class="brand-text">
        <div class="sup">Barantech Marine</div>
        <h1>Cruzo Lead Generation Agent</h1>
      </div>
    </div>
    <div class="api-bar">
      <input type="password" id="api-key-input" placeholder="Paste Anthropic API key (sk-ant-...)">
      <button class="save-btn" onclick="saveKey()">Save key</button>
      <span class="api-status" id="api-status"></span>
    </div>
  </header>

  <div class="panel">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('search')">Find leads</button>
      <button class="tab" onclick="switchTab('leads')">Leads list</button>
      <button class="tab" onclick="switchTab('email')">Draft email</button>
      <button class="tab" onclick="switchTab('calendar')">Schedule</button>
    </div>

    <!-- FIND LEADS -->
    <div id="tab-search" class="section active">
      <div class="card">
        <label>Lead segment</label>
        <div class="chip-row" id="segments">
          <button class="chip active" onclick="toggleChip(this)">Boat manufacturers (OEM)</button>
          <button class="chip active" onclick="toggleChip(this)">Yacht builders</button>
          <button class="chip" onclick="toggleChip(this)">Marine dealers &amp; distributors</button>
          <button class="chip" onclick="toggleChip(this)">Refit &amp; retrofit yards</button>
          <button class="chip" onclick="toggleChip(this)">Marine system integrators</button>
          <button class="chip" onclick="toggleChip(this)">Charter &amp; fleet operators</button>
        </div>
        <div class="row" style="margin-top:14px;">
          <div>
            <label>Vessel type</label>
            <select id="vessel">
              <option>Any</option>
              <option>Motorboats &amp; powerboats</option>
              <option>Sailing yachts</option>
              <option>Superyachts &amp; megayachts</option>
              <option>Commercial &amp; workboats</option>
              <option>RIBs &amp; tenders</option>
            </select>
          </div>
          <div>
            <label>Region</label>
            <select id="region">
              <option>Global</option>
              <option>North America</option>
              <option>Europe</option>
              <option>APAC</option>
              <option>Middle East</option>
              <option>Mediterranean</option>
            </select>
          </div>
        </div>
        <label>Target contact role</label>
        <select id="role">
          <option>Any decision maker</option>
          <option>CEO / Owner</option>
          <option>Product / R&amp;D Director</option>
          <option>Head of Electrical / Systems Engineering</option>
          <option>Purchasing / Procurement Manager</option>
          <option>Sales / Business Development</option>
        </select>
        <label>Qualifying criteria (optional)</label>
        <textarea id="criteria" placeholder="e.g. Already using NMEA 2000, building 30–80ft boats, looking to modernise helm controls..."></textarea>
      </div>
      <div class="action-row">
        <button class="btn btn-primary" id="search-btn" onclick="findLeads()">Find leads →</button>
        <div class="status-msg" id="search-status"></div>
      </div>
    </div>

    <!-- LEADS LIST -->
    <div id="tab-leads" class="section">
      <div class="metric-grid">
        <div class="metric"><div class="metric-label">Total leads</div><div class="metric-value" id="m-total">0</div></div>
        <div class="metric"><div class="metric-label">High fit (75+)</div><div class="metric-value" id="m-high">0</div></div>
        <div class="metric"><div class="metric-label">Emailed</div><div class="metric-value" id="m-emailed">0</div></div>
      </div>
      <div class="leads-wrap" id="leads-container">
        <div class="empty">No leads yet — use "Find leads" to generate your first batch.</div>
      </div>
    </div>

    <!-- DRAFT EMAIL -->
    <div id="tab-email" class="section">
      <div class="card">
        <label>Select lead</label>
        <select id="lead-select"><option value="">— choose a lead —</option></select>
        <label>Cruzo product to highlight</label>
        <select id="product">
          <option>Cruzo Panel Series (glass piezo control panels)</option>
          <option>Cruzo Smart Relay (NMEA 2000 relay module)</option>
          <option>Cruzo Connect mobile app</option>
          <option>Solo (single piezo glass switch)</option>
          <option>Boat Guard (retrofit piezo switch)</option>
          <option>MarineTouch Pro6 / 4Key (aluminium panels)</option>
          <option>Full Cruzo Boat Control System</option>
        </select>
        <label>Email tone</label>
        <select id="tone">
          <option>Professional &amp; concise</option>
          <option>Consultative / problem-solving</option>
          <option>Direct / punchy</option>
          <option>Partnership-oriented</option>
        </select>
      </div>
      <div class="action-row">
        <button class="btn btn-primary" id="email-btn" onclick="draftEmail()">Draft email →</button>
        <div class="status-msg" id="email-status"></div>
      </div>
      <div style="margin-top: 1.5rem; display:none;" id="email-output-wrap">
        <div class="email-subject-row">Subject: <span id="email-subject"></span></div>
        <div class="email-preview" id="email-body"></div>
        <div class="action-row" style="margin-top: 12px;">
          <button class="btn btn-primary" id="send-btn" onclick="sendEmail()" disabled>Send via Gmail →</button>
          <div class="status-msg" id="send-status"></div>
        </div>
      </div>
    </div>

    <!-- CALENDAR -->
    <div id="tab-calendar" class="section">
      <div class="card">
        <label>Select lead</label>
        <select id="cal-lead-select"><option value="">— choose a lead —</option></select>
        <div class="row">
          <div>
            <label>Date</label>
            <input type="text" id="cal-date" placeholder="e.g. April 10, 2026">
          </div>
          <div>
            <label>Time</label>
            <input type="text" id="cal-time" placeholder="e.g. 10:00 AM">
          </div>
        </div>
        <label>Meeting type</label>
        <select id="cal-purpose">
          <option>Discovery call</option>
          <option>Product demo — Cruzo Panel</option>
          <option>Product demo — Full System</option>
          <option>Technical integration review</option>
          <option>OEM partnership discussion</option>
          <option>Follow-up / proposal review</option>
        </select>
      </div>
      <div class="action-row">
        <button class="btn btn-primary" id="cal-btn" onclick="scheduleFollowUp()">Schedule in Google Calendar →</button>
        <div class="status-msg" id="cal-status"></div>
      </div>
      <div style="margin-top: 1.5rem;">
        <div class="section-title">Scheduled follow-ups</div>
        <div class="card" style="padding: 0 1.25rem;">
          <div id="cal-list"><div class="empty" style="padding: 1.5rem;">No follow-ups scheduled yet.</div></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const PROXY = '/api/proxy';
const MODEL = 'claude-sonnet-4-20250514';
let apiKey = localStorage.getItem('bt_api_key') || '';
let leads = [], emailedCount = 0, currentEmail = null, currentEmailLead = null, followUps = [];

const BARANTECH_CONTEXT = `Barantech (marine.barantech.com) makes the Cruzo Boat Control System — a smart boat control ecosystem including:
- Cruzo Panel Series: sleek glass piezo touch control panels, fully customisable, NMEA 2000 compatible
- Cruzo Smart Relay: NMEA 2000 certified relay module, 4x10A + 4x20A relays, IP66, integrates with Garmin EmpirBus, CZone, Raymarine
- Cruzo Connect: mobile app (iOS & Android) for full vessel control
- Solo: single sealed glass piezo switch with stainless steel housing
- Boat Guard: retrofit piezo switch replacing 22mm pushbuttons with interchangeable relay modules
- MarineTouch 4Key / Pro6: aluminium multi-button switch panels
- Windlass Switch: marine-grade piezo switch for anchor windlass
Ideal customers: boat manufacturers, yacht builders, OEMs, refit yards, marine system integrators, charter operators, marine dealers. Supports new builds and retrofit. Key differentiators: premium aesthetics, NMEA 2000 native, IP66-rated, compatible with Garmin EmpirBus / CZone / Raymarine, fully customisable.`;

window.onload = () => {
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey;
    document.getElementById('api-status').textContent = 'Key loaded';
  }
};

function saveKey() {
  apiKey = document.getElementById('api-key-input').value.trim();
  if (!apiKey) { document.getElementById('api-status').textContent = 'Please paste a key'; return; }
  localStorage.setItem('bt_api_key', apiKey);
  document.getElementById('api-status').textContent = 'Saved ✓';
  setTimeout(() => document.getElementById('api-status').textContent = '', 2000);
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['search','leads','email','calendar'][i]===t));
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}
function toggleChip(el) { el.classList.toggle('active'); }
function setStatus(id, msg, loading=false) {
  const el = document.getElementById(id);
  el.innerHTML = loading ? `<div class="spinner"></div> ${msg}` : msg;
}
function scoreBadge(score) {
  const n = parseInt(score);
  const cls = n >= 75 ? 'score-high' : n >= 50 ? 'score-mid' : 'score-low';
  return `<span class="score-badge ${cls}">${score}</span>`;
}
function updateMetrics() {
  document.getElementById('m-total').textContent = leads.length;
  document.getElementById('m-high').textContent = leads.filter(l => parseInt(l.score)>=75).length;
  document.getElementById('m-emailed').textContent = emailedCount;
}
function updateLeadSelects() {
  const opts = leads.map((l,i) => `<option value="${i}">${l.name} — ${l.company}</option>`).join('');
  ['lead-select','cal-lead-select'].forEach(id => {
    document.getElementById(id).innerHTML = '<option value="">— choose a lead —</option>' + opts;
  });
}
function renderLeads() {
  const c = document.getElementById('leads-container');
  if (!leads.length) { c.innerHTML = '<div class="empty">No leads yet.</div>'; return; }
  c.innerHTML = `<table>
    <thead><tr>
      <th style="width:20%">Contact</th>
      <th style="width:20%">Company</th>
      <th style="width:14%">Segment</th>
      <th style="width:13%">Region</th>
      <th style="width:24%">Why Cruzo fits</th>
      <th style="width:9%">Score</th>
    </tr></thead>
    <tbody>${leads.map(l => `<tr>
      <td>
        <div style="font-weight:500;">${l.name}</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">${l.title}</div>
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:1px;">${l.email||''}</div>
      </td>
      <td>${l.company}</td>
      <td><span class="tag">${l.segment||''}</span></td>
      <td style="font-size:12px;">${l.region||''}</td>
      <td style="font-size:12px;line-height:1.5;">${l.fit}</td>
      <td>${scoreBadge(l.score)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

async function callAPI(body) {
  if (!apiKey) throw new Error('No API key — paste your key at the top and click Save');
  const res = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, _apiKey: apiKey })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function findLeads() {
  const activeChips = [...document.querySelectorAll('#segments .chip.active')].map(c => c.textContent).join(', ');
  const vessel = document.getElementById('vessel').value;
  const region = document.getElementById('region').value;
  const role = document.getElementById('role').value;
  const criteria = document.getElementById('criteria').value.trim();
  if (!activeChips) { setStatus('search-status', 'Select at least one segment.'); return; }

  document.getElementById('search-btn').disabled = true;
  setStatus('search-status', 'Researching and qualifying leads...', true);

  const prompt = `${BARANTECH_CONTEXT}

Generate 6 specific, realistic B2B leads for the Cruzo product line.
Segments: ${activeChips}
Vessel type: ${vessel}
Region: ${region}
Contact role: ${role}
Criteria: ${criteria || 'none'}

Score 0-100 for Cruzo fit. Return ONLY valid JSON array, no markdown:
[{"name":"Full Name","title":"Job Title","company":"Company Name","email":"first.last@company.com","segment":"label","region":"Country","fit":"Why Cruzo fits in one sentence","score":85},...]`;

  try {
    const data = await callAPI({ model: MODEL, max_tokens: 1200, messages: [{role:'user',content:prompt}] });
    const text = data.content.map(b => b.text||'').join('');
    const newLeads = JSON.parse(text.replace(/```json|```/g,'').trim());
    leads = [...leads, ...newLeads].sort((a,b) => parseInt(b.score)-parseInt(a.score));
    renderLeads(); updateLeadSelects(); updateMetrics();
    setStatus('search-status', `${newLeads.length} leads added. Switch to "Leads list" to review.`);
  } catch(e) { setStatus('search-status', `Error: ${e.message}`); }
  document.getElementById('search-btn').disabled = false;
}

async function draftEmail() {
  const idx = document.getElementById('lead-select').value;
  const product = document.getElementById('product').value;
  const tone = document.getElementById('tone').value;
  if (idx === '') { setStatus('email-status', 'Please select a lead.'); return; }

  const lead = leads[parseInt(idx)];
  currentEmailLead = lead;
  document.getElementById('email-btn').disabled = true;
  setStatus('email-status', 'Drafting personalised outreach...', true);
  document.getElementById('email-output-wrap').style.display = 'none';

  const prompt = `${BARANTECH_CONTEXT}

Write a cold outreach email from Barantech to ${lead.name}, ${lead.title} at ${lead.company} (${lead.region}).
Product: ${product} | Tone: ${tone} | Fit: ${lead.fit}
Under 150 words, 3 paragraphs, no placeholders, no markdown, soft CTA for a 15-min call.
Return ONLY valid JSON: {"subject":"...","body":"..."}`;

  try {
    const data = await callAPI({ model: MODEL, max_tokens: 700, messages: [{role:'user',content:prompt}] });
    const text = data.content.map(b => b.text||'').join('');
    const email = JSON.parse(text.replace(/```json|```/g,'').trim());
    currentEmail = email;
    document.getElementById('email-subject').textContent = email.subject;
    document.getElementById('email-body').textContent = email.body;
    document.getElementById('email-output-wrap').style.display = 'block';
    document.getElementById('send-btn').disabled = false;
    setStatus('email-status', '');
  } catch(e) { setStatus('email-status', `Error: ${e.message}`); }
  document.getElementById('email-btn').disabled = false;
}

async function sendEmail() {
  if (!currentEmail || !currentEmailLead) return;
  document.getElementById('send-btn').disabled = true;
  setStatus('send-status', 'Sending via Gmail...', true);
  const prompt = `Send an email on behalf of Barantech marine:
To: ${currentEmailLead.email}
Subject: ${currentEmail.subject}
Body: ${currentEmail.body}`;
  try {
    await callAPI({
      model: MODEL, max_tokens: 300,
      messages: [{role:'user',content:prompt}],
      mcp_servers: [{ type: 'url', url: 'https://gmail.mcp.claude.com/mcp', name: 'gmail-mcp' }]
    });
    emailedCount++; updateMetrics();
    setStatus('send-status', `Sent to ${currentEmailLead.email}`);
  } catch(e) {
    setStatus('send-status', `Error: ${e.message}`);
    document.getElementById('send-btn').disabled = false;
  }
}

async function scheduleFollowUp() {
  const idx = document.getElementById('cal-lead-select').value;
  const date = document.getElementById('cal-date').value.trim();
  const time = document.getElementById('cal-time').value.trim();
  const purpose = document.getElementById('cal-purpose').value;
  if (idx === '') { setStatus('cal-status', 'Please select a lead.'); return; }
  if (!date || !time) { setStatus('cal-status', 'Please enter date and time.'); return; }

  const lead = leads[parseInt(idx)];
  document.getElementById('cal-btn').disabled = true;
  setStatus('cal-status', 'Creating calendar event...', true);

  const prompt = `Create a Google Calendar event:
Title: ${purpose} — ${lead.name}, ${lead.company} [Barantech]
Date: ${date} at ${time}
Attendee: ${lead.email}
Description: Barantech Cruzo follow-up. Fit: ${lead.fit}`;

  try {
    await callAPI({
      model: MODEL, max_tokens: 300,
      messages: [{role:'user',content:prompt}],
      mcp_servers: [{ type: 'url', url: 'https://gcal.mcp.claude.com/mcp', name: 'gcal-mcp' }]
    });
    followUps.push({ lead, date, time, purpose });
    renderFollowUps();
    setStatus('cal-status', 'Event created in Google Calendar.');
    document.getElementById('cal-date').value = '';
    document.getElementById('cal-time').value = '';
  } catch(e) { setStatus('cal-status', `Error: ${e.message}`); }
  document.getElementById('cal-btn').disabled = false;
}

function renderFollowUps() {
  const el = document.getElementById('cal-list');
  if (!followUps.length) { el.innerHTML = '<div class="empty" style="padding:1.5rem;">No follow-ups scheduled yet.</div>'; return; }
  el.innerHTML = followUps.map(f => `
    <div class="cal-row">
      <div>
        <div class="cal-name">${f.lead.name} — ${f.lead.company}</div>
        <div class="cal-detail">${f.purpose} · ${f.date} at ${f.time}</div>
      </div>
      <span class="tag">scheduled</span>
    </div>`).join('');
}
</script>
